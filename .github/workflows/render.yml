name: Render Animations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Install Chrome for Remotion
      - run: npx remotion browser ensure

      - run: mkdir -p out

      # Render video
      - run: npx remotion render src/index.ts InspectShort out/inspect-short.mp4 --codec=h264

      - uses: actions/upload-artifact@v4
        with:
          name: inspect-short
          path: out/inspect-short.mp4
          retention-days: 7
