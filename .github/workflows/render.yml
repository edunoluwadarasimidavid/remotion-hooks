name: Render Animations

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 18
      - run: npm install
      - run: mkdir -p out
      - run: npx remotion render ReactAndroidShort out/video.mp4
      - uses: actions/upload-artifact@v4
        with:
          name: animations
          path: out/
