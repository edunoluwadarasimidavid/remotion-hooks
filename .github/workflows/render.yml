name: Render Animations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 20
      - run: npm install
      - run: npx remotion browser ensure
      - run: mkdir -p out
      - run: npx remotion render InspectShort out/inspect-short.mp4 --codec=h264
      - uses: actions/upload-artifact@v4
        with:
          name: inspect-short
          path: out/inspect-short.mp4
          retention-days: 7